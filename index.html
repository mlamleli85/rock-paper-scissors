<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="assets/css/style.css" />

    <title>ROCK, PAPER, SCISSORS!</title>
  </head>

  <body>
    <h1 class="header">ROCK, PAPER, SCISSORS!</h1>
    <div>
      <img
        src="assets/images/rock-paper-scissors.png"
        alt="The Rock, Paper, Scissors logo"
      />
    </div>

    <div class="player-choice">
      <div>
        <h2>Choose your weapon:</h2>
      <button class="btn">
        <img src="assets/images/rock.png" alt="Rock" />
      </button>
      <button class="btn">
        <img src="assets/images/paper.png" alt="Paper" />
      </button>
      <button class="btn">
        <img src="assets/images/scissors.png" alt="Scissors" />
      </button>
    </div>

    <div class="score-board">
      <p>Player Score: <span id="player-score">0</span></p>
      <p>Computer Score: <span id="computer-score">0</span></p>
    </div>
    <footer></footer>
    <script src="assets/js/script.js"></script>
  </body>
</html>
