<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Custom CSS Link -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- Favicon links-->
    <link rel="icon" type="image/png" size="32x32" href="assets/images/favicon-32x32.png">

    <title>ROCK, PAPER, SCISSORS!</title>
  </head>

  <body>
    <header>
      <h1>ROCK, PAPER, SCISSORS!</h1>
    </header>

    <section class="play-area">
      
      <!-- Player Choice Section -->
      <div class="player-choice">
        <div>
          <h2>Choose your weapon:</h2>
        <button class="control" data-choice="0">Rock
          <i class="fa-solid fa-hand-back-fist"></i>
        </button>
        <button class="control" data-choice="1">Paper
          <i class="fa-solid fa-hand"></i>
        </button>
        <button class="control" data-choice="2">Scissors
          <i class="fa-solid fa-hand-scissors"></i>
        </button>
      </div>

      <!-- Message div for the result of each round  -->
      <div id="messages"></div>

      <!-- Play Game Section -->
      <div id="play-game">
        <div class="player">
          <h3 class="score">Player Score: <span id="player-score">0</span></h3>
          <img id="player-image" src="assets/images/rock-paper-scissors.png" alt="The Rock, Paper, Scissors logo">
        </div>

        <div class="vs">
          <h2>VS</h2>
        </div>

        <div class="computer">
          <h3 class="choice">Computer Score: <span id="computer-score">0</span></h3>
          <img id="computer-image" src="assets/images/rock-paper-scissors.png" alt="The Rock, Paper, Scissors logo">
        </div>
      </div>  
    </section>
    <footer>

    </footer>

    <!-- Font Awesome script -->
    <script src="https://kit.fontawesome.com/7e71df1cf2.js" crossorigin="anonymous"></script>

    <script src="assets/js/script.js"></script>
  </body>
</html>
